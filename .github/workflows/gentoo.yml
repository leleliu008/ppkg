name: Gentoo

on:
  push:
    branches: [ master, dev, tmp ]
  pull_request:
    branches: [ master, dev, tmp ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    container: madhacking/gentoo

    env:
      CC:     ${{ github.workspace }}/cc
      CXX:    ${{ github.workspace }}/c++
      AR:     ${{ github.workspace }}/ar
      RANLIB: ${{ github.workspace }}/ranlib

    steps:
      - run: emerge --sync
      - run: emerge net-misc/curl
        #sys-devel/gcc

      - uses: actions/checkout@v5

      - run: curl -LO https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
      - run: tar xf zig-x86_64-linux-0.16.0.tar.xz --strip-components=1
      - run : |
          for item in cc c++ ar ranlib
          do
            cat > "$item" <<EOF
            #!/bin/sh
            set -ex
            exec "${{ github.workspace }}/zig" $item "\$@"
          EOF
            chmod +x "$item"
          done

      - run: ./ppkg --help
      - run: ./ppkg --version

      - run: ./ppkg setup

      - run: ./ppkg about

      - run: ./ppkg integrate zsh

      - run: ./ppkg update

      - run: ./ppkg search lib
      - run: ./ppkg search uctags

      - run: ./ppkg info uctags
      - run: ./ppkg info uctags version
      - run: ./ppkg info uctags web-url
      - run: ./ppkg info uctags src-url

      - run: ./ppkg depends uctags

      - run: ./ppkg install uctags

      - run: ./ppkg tree uctags

      - run: ./ppkg bundle uctags .tar.xz

      - run: ./ppkg formula-repo-list

      - run: ./ppkg ls-available
      - run: ./ppkg ls-installed
      - run: ./ppkg ls-outdated

      - run: ./ppkg is-available uctags
      - run: ./ppkg is-installed uctags
      - run: ./ppkg is-outdated  uctags || echo "not outdated"

      - run: ./ppkg uninstall uctags

      - run: ./ppkg fetch curl

      - run: ./ppkg upgrade-self
